services:
  mongo:
    image: mongo:7
    volumes:
      - mongo_data:/data/db
      - ./mongo-init:/docker-entrypoint-initdb.d:ro
    environment:
      MONGO_INITDB_DATABASE: complaion_demo
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10

  seeder:
    build: ./mongo-init
    command: mongosh mongodb://mongo:27017/complaion_demo --file /seed.js
    depends_on:
      mongo:
        condition: service_healthy
    restart: "no"

  backend:
    build: ./backend
    environment:
      MONGODB_URL: mongodb://mongo:27017
      ACADEMY_JWT_SECRET: ${ACADEMY_JWT_SECRET:-change_me_in_production}
      FRONTEND_ORIGINS: ${FRONTEND_ORIGINS:-http://localhost:3000,http://localhost:5173}
    expose:
      - "80"
    networks:
      default: {}
      coolify:
        aliases:
          - complaion-academy-backend
    depends_on:
      mongo:
        condition: service_healthy
      seeder:
        condition: service_completed_successfully

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    expose:
      - "80"
    networks:
      default: {}
      coolify:
        aliases:
          - complaion-academy-frontend
    depends_on:
      - backend

networks:
  coolify:
    external: true

volumes:
  mongo_data:
