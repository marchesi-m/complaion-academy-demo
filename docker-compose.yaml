services:
  mongo:
    image: mongo:7
    volumes:
      - mongo_data:/data/db
      - ./mongo-init:/docker-entrypoint-initdb.d:ro
    environment:
      MONGO_INITDB_DATABASE: complaion_demo
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      MONGODB_URL: mongodb://mongo:27017
      ACADEMY_JWT_SECRET: ${ACADEMY_JWT_SECRET:-change_me_in_production}
      FRONTEND_ORIGINS: ${FRONTEND_ORIGINS:-http://localhost:3000,http://localhost:5173}
    expose:
      - "8000"
    depends_on:
      mongo:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    expose:
      - "80"
    depends_on:
      - backend

volumes:
  mongo_data:
